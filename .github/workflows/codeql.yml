# Disabled: CodeQL requires GitHub Advanced Security, which is not available
# on the free plan for private repositories. Re-enable if the plan is upgraded.
name: CodeQL
on:
  push:
    branches: [main]
  schedule:
    - cron: "30 10 * * 1"
permissions:
  security-events: write
  contents: read
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    if: false
    uses: greenticai/.github/.github/workflows/codeql.yml@main
    with:
      toolchain-variant: wasm
