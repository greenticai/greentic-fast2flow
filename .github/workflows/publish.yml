name: Publish

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional release tag override in vX.Y.Z format"
        required: false
        type: string
  push:
    branches:
      - master

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  version-check:
    name: Validate Tag and Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      crate: ${{ steps.version.outputs.crate }}
    steps:
      - uses: actions/checkout@v4
      - id: version
        name: Resolve version and release tag
        shell: bash
        run: |
          set -euo pipefail

          eval "$(python3 - <<'PY'
import tomllib

with open('Cargo.toml', 'rb') as f:
    root = tomllib.load(f)

workspace = root.get('workspace', {})
metadata = workspace.get('metadata', {}).get('fast2flow', {})
authoritative = metadata.get('authoritative_crate')
if not authoritative:
    raise SystemExit('workspace.metadata.fast2flow.authoritative_crate is required')

version = workspace.get('package', {}).get('version')
if not version:
    raise SystemExit('workspace.package.version is required')

print(f'CRATE={authoritative}')
print(f'VERSION={version}')
PY
          )"

          EXPECTED_TAG="v${VERSION}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          elif [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG="${GITHUB_REF_NAME}"
          elif [ "${GITHUB_REF_TYPE}" = "branch" ] && [ "${GITHUB_REF_NAME}" = "master" ]; then
            TAG="${EXPECTED_TAG}"
          else
            echo "Unsupported trigger context: ${GITHUB_REF_TYPE}/${GITHUB_REF_NAME}"
            exit 1
          fi

          if [ "${GITHUB_REF_TYPE}" = "tag" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "$TAG" != "$EXPECTED_TAG" ]; then
              echo "Tag/version mismatch: got '$TAG' but workspace version requires '$EXPECTED_TAG'"
              exit 1
            fi
          fi

          echo "crate=$CRATE" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  verify:
    name: Verify
    runs-on: ubuntu-latest
    needs: version-check
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.0
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Run local check script
        env:
          CI: "true"
        run: bash ci/local_check.sh

  build-release-artifacts:
    name: Build ${{ matrix.id }}
    runs-on: ${{ matrix.os }}
    needs:
      - version-check
      - verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - id: linux-aarch64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
          - id: macos15-x86_64
            os: macos-15
            target: x86_64-apple-darwin
            archive: tar.gz
          - id: macos15-aarch64
            os: macos-15
            target: aarch64-apple-darwin
            archive: tar.gz
          - id: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
          - id: windows-aarch64
            os: windows-latest
            target: aarch64-pc-windows-msvc
            archive: zip

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.0
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Install Linux ARM64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build binaries
        shell: bash
        env:
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
        run: |
          set -euo pipefail
          cargo build --release --locked --target "${{ matrix.target }}" -p fast2flow-cli --bin fast2flow-cli
          cargo build --release --locked --target "${{ matrix.target }}" -p fast2flow-routing-gtpack --bin fast2flow-routing-host

      - name: Package Unix artifacts
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.version-check.outputs.version }}"
          target="${{ matrix.target }}"
          out_dir="release"
          mkdir -p "$out_dir"

          stage="${{ matrix.id }}"
          mkdir -p "$stage"
          cp "target/${target}/release/fast2flow-cli" "$stage/"
          cp "target/${target}/release/fast2flow-routing-host" "$stage/"

          archive="$out_dir/fast2flow-${version}-${target}.tar.gz"
          tar -C "$stage" -czf "$archive" .
          sha256sum "$archive" > "$archive.sha256"

      - name: Package Windows artifacts
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $version = "${{ needs.version-check.outputs.version }}"
          $target = "${{ matrix.target }}"
          $outDir = "release"
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null

          $stage = "${{ matrix.id }}"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item "target/$target/release/fast2flow-cli.exe" "$stage/"
          Copy-Item "target/$target/release/fast2flow-routing-host.exe" "$stage/"

          $archive = "$outDir/fast2flow-$version-$target.zip"
          if (Test-Path $archive) { Remove-Item $archive }
          Compress-Archive -Path "$stage/*" -DestinationPath $archive

          $hash = (Get-FileHash -Algorithm SHA256 $archive).Hash.ToLower()
          "$hash  $(Split-Path -Leaf $archive)" | Out-File -Encoding ascii "$archive.sha256"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.id }}
          path: release/*
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - version-check
      - build-release-artifacts
    steps:
      - uses: actions/checkout@v4
      - name: Ensure release tag exists on master push
        if: github.ref_type == 'branch' && github.ref_name == 'master'
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ needs.version-check.outputs.tag }}"
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists in origin"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${TAG}" "${GITHUB_SHA}"
          git push origin "${TAG}"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: release-*
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version-check.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: artifacts/*
