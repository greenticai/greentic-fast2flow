name: CI

on:
  workflow_call:
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional release tag override in vX.Y.Z format"
        required: false
        type: string
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  version-check:
    name: Validate Tag and Version
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      crate: ${{ steps.version.outputs.crate }}
    steps:
      - uses: actions/checkout@v4
      - id: version
        name: Resolve version and release tag
        shell: bash
        run: |
          set -euo pipefail

          eval "$(python3 - <<'PY'
          import tomllib

          with open('Cargo.toml', 'rb') as f:
              root = tomllib.load(f)

          workspace = root.get('workspace', {})
          metadata = workspace.get('metadata', {}).get('fast2flow', {})
          authoritative = metadata.get('authoritative_crate')
          if not authoritative:
              raise SystemExit('workspace.metadata.fast2flow.authoritative_crate is required')

          version = workspace.get('package', {}).get('version')
          if not version:
              raise SystemExit('workspace.package.version is required')

          print(f'CRATE={authoritative}')
          print(f'VERSION={version}')
          PY
          )"

          EXPECTED_TAG="v${VERSION}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          elif [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG="${GITHUB_REF_NAME}"
          elif [ "${GITHUB_REF_TYPE}" = "branch" ] && [ "${GITHUB_REF_NAME}" = "main" ]; then
            TAG="${EXPECTED_TAG}"
          else
            echo "Unsupported trigger context: ${GITHUB_REF_TYPE}/${GITHUB_REF_NAME}"
            exit 1
          fi

          if [ "${GITHUB_REF_TYPE}" = "tag" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "$TAG" != "$EXPECTED_TAG" ]; then
              echo "Tag/version mismatch: got '$TAG' but workspace version requires '$EXPECTED_TAG'"
              exit 1
            fi
          fi

          echo "crate=$CRATE" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94.0
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy
          targets: wasm32-wasip2
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy host crates
        run: >-
          cargo clippy
          -p fast2flow-contracts
          -p fast2flow-core
          -p fast2flow-strategy
          -p fast2flow-strategy-phase1
          -p fast2flow-indexer
          -p fast2flow-hooks
          -p fast2flow-llm
          -p fast2flow-llm-openai
          -p fast2flow-llm-ollama
          -p fast2flow-routing-gtpack
          -p fast2flow-bundle
          -p greentic-fast2flow
          --all-targets
          --all-features
          --
          -D warnings
      - name: Clippy WASM components
        run: >-
          cargo clippy
          -p fast2flow-component-indexer
          -p fast2flow-component-matcher
          -p fast2flow-component-router
          --target wasm32-wasip2
          --
          -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94.0
        with:
          toolchain: 1.95.0
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --workspace --all-features

  build-wasm-components:
    name: Build WASM Components
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94.0
        with:
          toolchain: 1.95.0
          targets: wasm32-wasip2
      - uses: Swatinem/rust-cache@v2
      - name: Build WASM components
        run: cargo build -p fast2flow-component-indexer -p fast2flow-component-matcher -p fast2flow-component-router --target wasm32-wasip2 --release
      - name: Verify WASM artifacts
        run: |
          set -euo pipefail
          for component in indexer matcher router; do
            wasm="target/wasm32-wasip2/release/fast2flow_component_${component}.wasm"
            if [ ! -f "$wasm" ]; then
              echo "Missing WASM artifact: $wasm" >&2
              exit 1
            fi
            size=$(stat -c%s "$wasm" 2>/dev/null || stat -f%z "$wasm")
            echo "  $component: ${size} bytes"
          done

  package-dry-run:
    name: Package Dry Run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94.0
        with:
          toolchain: 1.95.0
          targets: wasm32-wasip2
      - uses: Swatinem/rust-cache@v2
      - name: Run package/publish dry-run checks
        run: bash ci/publish_dry_run.sh
      - name: Build direct router component package
        run: bash scripts/build_components.sh
      - name: Validate direct router component package
        run: bash scripts/package_components.sh --check

  build-release-artifacts:
    name: Build ${{ matrix.id }}
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref_name == 'main')
    runs-on: ${{ matrix.os }}
    needs:
      - version-check
      - lint
      - test
      - build-wasm-components
      - package-dry-run
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - id: linux-aarch64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
          - id: macos15-x86_64
            os: macos-15-intel
            target: x86_64-apple-darwin
            archive: tar.gz
          - id: macos15-aarch64
            os: macos-15
            target: aarch64-apple-darwin
            archive: tar.gz
          - id: windows-x86_64
            os: windows-2025
            target: x86_64-pc-windows-msvc
            archive: zip
          - id: windows-aarch64
            os: windows-11-arm
            target: aarch64-pc-windows-msvc
            archive: zip

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94.0
        with:
          toolchain: 1.95.0
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Install Linux ARM64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          rustup target add aarch64-unknown-linux-gnu

      - name: Build binaries
        shell: bash
        env:
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
        run: |
          set -euo pipefail
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          fi
          cargo build --release --locked --target "${{ matrix.target }}" -p greentic-fast2flow --bin greentic-fast2flow
          cargo build --release --locked --target "${{ matrix.target }}" -p fast2flow-routing-gtpack --bin greentic-fast2flow-routing-host

      - name: Package Unix artifacts
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.version-check.outputs.version }}"
          target="${{ matrix.target }}"
          out_dir="release"
          mkdir -p "$out_dir"

          stage_cli="${{ matrix.id }}-greentic-fast2flow"
          stage_host="${{ matrix.id }}-greentic-fast2flow-routing-host"
          mkdir -p "$stage_cli" "$stage_host"
          cp "target/${target}/release/greentic-fast2flow" "$stage_cli/"
          cp "target/${target}/release/greentic-fast2flow-routing-host" "$stage_host/"

          archive_cli="$out_dir/greentic-fast2flow-v${version}-${target}.tar.gz"
          archive_host="$out_dir/greentic-fast2flow-routing-host-v${version}-${target}.tar.gz"
          tar -C "$stage_cli" -czf "$archive_cli" .
          tar -C "$stage_host" -czf "$archive_host" .
          sha256sum "$archive_cli" > "$archive_cli.sha256"
          sha256sum "$archive_host" > "$archive_host.sha256"

      - name: Package Windows artifacts
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $version = "${{ needs.version-check.outputs.version }}"
          $target = "${{ matrix.target }}"
          $outDir = "release"
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null

          $stageCli = "${{ matrix.id }}-greentic-fast2flow"
          $stageHost = "${{ matrix.id }}-greentic-fast2flow-routing-host"
          New-Item -ItemType Directory -Force -Path $stageCli | Out-Null
          New-Item -ItemType Directory -Force -Path $stageHost | Out-Null
          Copy-Item "target/$target/release/greentic-fast2flow.exe" "$stageCli/"
          Copy-Item "target/$target/release/greentic-fast2flow-routing-host.exe" "$stageHost/"

          $archiveCli = "$outDir/greentic-fast2flow-v$version-$target.zip"
          $archiveHost = "$outDir/greentic-fast2flow-routing-host-v$version-$target.zip"
          if (Test-Path $archiveCli) { Remove-Item $archiveCli }
          if (Test-Path $archiveHost) { Remove-Item $archiveHost }
          Compress-Archive -Path "$stageCli/*" -DestinationPath $archiveCli
          Compress-Archive -Path "$stageHost/*" -DestinationPath $archiveHost

          $hashCli = (Get-FileHash -Algorithm SHA256 $archiveCli).Hash.ToLower()
          "$hashCli  $(Split-Path -Leaf $archiveCli)" | Out-File -Encoding ascii "$archiveCli.sha256"

          $hashHost = (Get-FileHash -Algorithm SHA256 $archiveHost).Hash.ToLower()
          "$hashHost  $(Split-Path -Leaf $archiveHost)" | Out-File -Encoding ascii "$archiveHost.sha256"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.id }}
          path: release/*
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref_name == 'main')
    runs-on: ubuntu-latest
    needs:
      - version-check
      - build-release-artifacts
    steps:
      - uses: actions/checkout@v4
      - name: Ensure release tag exists on main push
        if: github.ref_type == 'branch' && github.ref_name == 'main'
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ needs.version-check.outputs.tag }}"
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists in origin"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${TAG}" "${GITHUB_SHA}"
          git push origin "${TAG}"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: release-*
          merge-multiple: true

      - name: Generate release manifests
        shell: bash
        run: |
          set -euo pipefail
          python3 ci/generate_release_manifests.py \
            --artifacts-dir artifacts \
            --version "${{ needs.version-check.outputs.version }}" \
            --repository "${{ github.repository }}"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version-check.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: artifacts/*

  publish-gtpack-ghcr:
    name: Publish gtpack to GHCR
    if: github.event_name == 'push' && github.ref_name == 'main'
    runs-on: ubuntu-latest
    needs:
      - version-check
      - lint
      - test
      - build-wasm-components
      - package-dry-run
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94.0
        with:
          toolchain: 1.95.0
          targets: wasm32-wasip2

      - name: Install cargo-binstall
        uses: taiki-e/install-action@cargo-binstall

      - name: Install greentic CLI tools
        shell: bash
        run: |
          set -euo pipefail
          cargo binstall --no-confirm gtc greentic-dev greentic-pack --locked --force

      - name: Build fast2flow.gtpack
        shell: bash
        run: |
          set -euo pipefail
          bash ci/build_gtpack.sh dist

      - name: Set up ORAS
        uses: oras-project/setup-oras@v1

      - name: Log in to GHCR
        shell: bash
        run: |
          set -euo pipefail
          echo "${{ github.token }}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push gtpack artifact
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.version-check.outputs.version }}"
          base_ref="ghcr.io/${{ github.repository_owner }}/providers/routing-hook/fast2flow.gtpack"
          media_type="application/vnd.greentic.fast2flow.gtpack.layer.v1+gzip"
          artifact_type="application/vnd.greentic.fast2flow.gtpack.v1"
          artifact="dist/fast2flow.gtpack"

          oras push "${base_ref}:v${version}" \
            --artifact-type "${artifact_type}" \
            "${artifact}:${media_type}"

          oras push "${base_ref}:latest" \
            --artifact-type "${artifact_type}" \
            "${artifact}:${media_type}"

  publish-router-component-ghcr:
    name: Publish router component to GHCR
    if: github.event_name == 'push' && github.ref_name == 'main'
    runs-on: ubuntu-latest
    needs:
      - version-check
      - lint
      - test
      - build-wasm-components
      - package-dry-run
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94.0
        with:
          toolchain: 1.95.0
          targets: wasm32-wasip2
      - uses: Swatinem/rust-cache@v2
      - name: Build direct router component package
        run: |
          set -euo pipefail
          bash scripts/build_components.sh
          bash scripts/package_components.sh
      - name: Set up ORAS
        uses: oras-project/setup-oras@v1
      - name: Log in to GHCR
        shell: bash
        run: |
          set -euo pipefail
          echo "${{ github.token }}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Push router component package
        run: bash scripts/publish_components.sh
